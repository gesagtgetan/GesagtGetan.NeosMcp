Neos:
  ContentRepositoryRegistry:
    presets:
      'default':
        authProvider:
          factoryObjectName: GesagtGetan\NeosMcp\Security\McpAwareAuthProviderFactory

  Flow:
    mvc:
      routes:
        GesagtGetan.NeosMcp:
          position: start
    security:
      authentication:
        providers:
          'GesagtGetan.SingleSignOn:Backend':
            requestPatterns:
              'GesagtGetan.NeosMcp:OAuthAuthorize':
                pattern: 'ControllerObjectName'
                patternOptions:
                  controllerObjectNamePattern: 'GesagtGetan\NeosMcp\OAuth\Controller\OAuthAuthorizeController'

GesagtGetan:
  NeosMcp:
    contentRepositoryId: 'default'
    stdioWorkspaceName: 'llm-review'
    stdioWorkspaceTitle: 'MCP Stdio'
    stdioWorkspaceDescription: 'Shared workspace for MCP stdio transport'
    stdioBaseWorkspaceName: 'live'
    oauth:
      enabled: false
      issuer: null
      # IMPORTANT: Client settings (id, secret, knownRedirectUris) are stored in the
      # database. After changing any value below, run ./flow mcp:setup to apply them.
      client:
        id: null
        secret: null
        knownRedirectUris:
          - 'https://claude.ai/api/mcp/auth_callback'
          - 'https://claude.com/api/mcp/auth_callback'
          - 'https://chatgpt.com/connector_platform_oauth_redirect'
          - 'https://platform.openai.com/apps-manage/oauth'
      accessTokenLifetime: 3600
      refreshTokenLifetime: 604800
      authorizationCodeLifetime: 600
      privateKeyFile: 'oauth-private.key'
      publicKeyFile: 'oauth-public.key'
      encryptionKeyFile: 'oauth-encryption.key'
      corsAllowedOrigins: ['https://claude.ai', 'https://claude.com', 'https://chatgpt.com', 'https://chat.openai.com']
